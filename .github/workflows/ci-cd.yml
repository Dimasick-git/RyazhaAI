name: RyazhaAI CI/CD & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build and Test
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0
        
      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint (if available)
        run: |
          if [ -f .eslintrc.js ] || [ -f .eslintrc.json ]; then
            npm run lint || echo "No lint script found"
          else
            echo "No ESLint config found"
          fi
          
      - name: Build application
        run: npm run build
        
      - name: Run tests (if available)
        run: |
          if npm run 2>&1 | grep -q "test"; then
            npm test
          else
            echo "No tests found, skipping"
          fi
          
      - name: Build release package with .nro
        run: npm run build-release
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.4.0
        with:
          name: ryazhaai-dist
          path: dist/
          retention-days: 7
          
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4.4.0
        with:
          name: ryazhaai-release
          path: release/
          retention-days: 7

  # Deploy to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0
        
      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4.1.0
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Docker Build and Deploy (только если есть Dockerfile)
  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: dimasick/ryazhaai
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        uses: docker/build-push-action@v5.4.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Security Scan
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0
        
      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
        
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3.27.0
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Performance and Health Check (только если есть Lighthouse конфиг)
  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Wait for deployment
        run: sleep 60
        
      - name: Check website availability
        run: |
          echo "Checking https://dimasick-git.github.io/RyazhaAI..."
          curl -f -s -o /dev/null -w "%{http_code}" https://dimasick-git.github.io/RyazhaAI || echo "Site not ready yet"
          
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10.1.0
        with:
          urls: |
            https://dimasick-git.github.io/RyazhaAI
          configPath: '.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Notification
  notify:
    runs-on: ubuntu-latest
    needs: [deploy, docker, health-check]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Notify deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "RyazhaAI успешно развернут на GitHub Pages!"
            echo "URL: https://dimasick-git.github.io/RyazhaAI"
          else
            echo "Деплой не удался"
          fi
          
          if [ "${{ needs.docker.result }}" == "success" ]; then
            echo "Docker образ успешно собран и опубликован"
            echo "Image: dimasick/ryazhaai:latest"
          fi
